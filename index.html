
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f5f5f5">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>旅店流水账</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f0f5; color: #333;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; padding: 16px;
    }
    .app {
      width: 100%; max-width: 480px;
      background: #fff; border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .tabs {
      display: flex; border-bottom: 1px solid #eee;
    }
    .tab {
      flex: 1; padding: 14px; text-align: center;
      font-weight: 600; color: #999; cursor: pointer;
      transition: 0.2s;
    }
    .tab.active { color: #007AFF; border-bottom: 2px solid #007AFF; }
    .page { display: none; padding: 16px; }
    .page.active { display: block; }
    .month-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .month-bar button {
      background: none; border: none; font-size: 20px; padding: 12px;
      cursor: pointer; color: #007AFF;
    }
    .month-title {
      font-size: 18px; font-weight: bold;
    }
    .summary-cards {
      display: flex; gap: 12px; margin-bottom: 20px;
    }
    .card {
      flex: 1; padding: 12px; border-radius: 12px;
      text-align: center; color: #fff;
    }
    .card.income { background: #34C759; }
    .card.expense { background: #FF3B30; }
    .card.balance { background: #007AFF; }
    .card .label { font-size: 12px; opacity: 0.9; }
    .card .value { font-size: 18px; font-weight: bold; margin-top: 4px; }
    .sync-status {
      text-align: center; font-size: 12px; color: #999;
      padding: 4px 0; margin-bottom: 8px;
    }
    .sync-status.synced { color: #34C759; }
    .sync-status.syncing { color: #FF9500; }
    .sync-status.error { color: #FF3B30; }
    .tx-list { list-style: none; }
    .tx-item {
      display: flex; align-items: center; padding: 12px 0;
      border-bottom: 1px solid #f0f0f5;
    }
    .tx-icon {
      width: 40px; height: 40px; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #fff; margin-right: 12px; flex-shrink: 0;
    }
    .tx-icon.income { background: #34C759; }
    .tx-icon.expense { background: #FF3B30; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-category { font-weight: 500; }
    .tx-date { font-size: 12px; color: #999; margin-top: 2px; }
    .tx-amount { font-weight: 600; font-size: 16px; flex-shrink: 0; margin-left: 8px; }
    .tx-amount.income { color: #34C759; }
    .tx-amount.expense { color: #FF3B30; }
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 12px;
    }
    .filter-btn {
      padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px;
      background: #fff; font-size: 14px; cursor: pointer;
      transition: 0.2s;
    }
    .filter-btn.active { background: #007AFF; color: #fff; border-color: #007AFF; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px; border: 1px solid #ddd;
      border-radius: 10px; font-size: 16px;
    }
    .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .tag {
      padding: 6px 14px; background: #f0f0f5; border-radius: 20px;
      font-size: 14px; cursor: pointer;
    }
    .btn-primary {
      width: 100%; padding: 14px; background: #007AFF;
      color: #fff; border: none; border-radius: 12px;
      font-size: 18px; font-weight: bold; cursor: pointer;
    }
    .btn-primary:disabled { background: #ccc; }
    .btn-secondary {
      flex: 1; padding: 12px; color: #fff; border: none;
      border-radius: 10px; font-size: 14px; cursor: pointer;
    }
    .btn-export { background: #007AFF; }
    .btn-import { background: #34C759; }
    .chart-container { max-width: 300px; margin: 0 auto 20px; }
    .delete-btn {
      background: none; border: none; color: #FF3B30; font-size: 20px;
      cursor: pointer; padding: 0 8px; flex-shrink: 0;
    }
    .action-buttons {
      display: flex; gap: 12px; margin-top: 16px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="tabs">
    <div class="tab active" data-page="list">流水</div>
    <div class="tab" data-page="add">记一笔</div>
    <div class="tab" data-page="summary">汇总</div>
  </div>

  <div class="page active" id="list">
    <div class="month-bar">
      <button id="prevMonthBtn">◀</button>
      <span class="month-title" id="currentMonth"></span>
      <button id="nextMonthBtn">▶</button>
    </div>
    <div class="sync-status" id="syncStatus"></div>
    <div class="summary-cards" id="listCards"></div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="income">收入</button>
      <button class="filter-btn" data-filter="expense">支出</button>
    </div>
    <ul class="tx-list" id="txList"></ul>
    <div class="action-buttons">
      <button class="btn-secondary btn-export" id="exportBtn">📤 导出</button>
      <button class="btn-secondary btn-import" id="importBtn">📥 导入</button>
      <button class="btn-secondary" style="background:#FF9500;" id="forceSyncBtn">🔄 同步</button>
    </div>
  </div>

  <div class="page" id="add">
    <h3 style="margin-bottom:16px;">记一笔</h3>
    <div class="form-group">
      <label>类型</label>
      <select id="typeSelect">
        <option value="income">收入</option>
        <option value="expense">支出</option>
      </select>
    </div>
    <div class="form-group">
      <label>金额</label>
      <input type="number" id="amountInput" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="form-group">
      <label>项目</label>
      <input type="text" id="categoryInput" placeholder="如房费、电费...">
      <div class="quick-tags" id="quickTags"></div>
    </div>
    <div class="form-group">
      <label>日期</label>
      <input type="date" id="dateInput">
    </div>
    <div class="form-group">
      <label>备注（可选）</label>
      <input type="text" id="noteInput" placeholder="备注">
    </div>
    <button class="btn-primary" id="saveBtn">保存</button>
  </div>

  <div class="page" id="summary">
    <div class="month-bar">
      <button id="summaryPrevBtn">◀</button>
      <span class="month-title" id="summaryMonth"></span>
      <button id="summaryNextBtn">▶</button>
    </div>
    <div class="summary-cards" id="summaryCards"></div>
    <div class="chart-container">
      <canvas id="pieChart"></canvas>
    </div>
    <div id="detailList"></div>
  </div>
</div>

<script>
  // ============ 配置（只改这一行！）============
  var GITHUB_TOKEN = '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';
  var GITHUB_REPO = 'higou8888-byte/hotel';
  var GITHUB_FILE = 'ledger_data.json';
  // ============ 配置结束 ============

  var STORAGE_KEY = 'hotel_ledger_transactions';
  var RECENT_INCOME_KEY = 'recent_income';
  var RECENT_EXPENSE_KEY = 'recent_expense';
  var SYNC_TIME_KEY = 'hotel_ledger_last_sync';

  var transactions = [];
  var currentListMonth = new Date().toISOString().slice(0,7);
  var currentSummaryMonth = new Date().toISOString().slice(0,7);
  var filterType = 'all';
  var pieChartInstance = null;
  var isSyncing = false;

  // ============ 本地数据 ============
  function loadLocalData() {
    var data = localStorage.getItem(STORAGE_KEY);
    transactions = data ? JSON.parse(data) : [];
  }

  function saveLocalData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
  }

  // ============ 同步状态显示 ============
  function setSyncStatus(status, text) {
    var el = document.getElementById('syncStatus');
    if (el) {
      el.textContent = text;
      el.className = 'sync-status ' + status;
    }
  }

  // ============ GitHub 上传 ============
  function uploadToGitHub(callback) {
    if (isSyncing) { if (callback) callback(false); return; }
    isSyncing = true;
    setSyncStatus('syncing', '同步中...');
    
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(transactions, null, 2))));
    
    // 先获取文件 sha
    var xhr1 = new XMLHttpRequest();
    xhr1.open('GET', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + GITHUB_FILE);
    xhr1.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
    xhr1.setRequestHeader('Accept', 'application/vnd.github.v3+json');
    
    xhr1.onload = function() {
      var sha = '';
      if (xhr1.status === 200) {
        try {
          var data = JSON.parse(xhr1.responseText);
          sha = data.sha || '';
        } catch(e) {}
      }
      
      // 上传文件
      var body = JSON.stringify({
        message: '自动同步流水数据',
        content: content,
        sha: sha || undefined
      });
      
      var xhr2 = new XMLHttpRequest();
      xhr2.open('PUT', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + GITHUB_FILE);
      xhr2.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
      xhr2.setRequestHeader('Content-Type', 'application/json');
      xhr2.setRequestHeader('Accept', 'application/vnd.github.v3+json');
      
      xhr2.onload = function() {
        isSyncing = false;
        if (xhr2.status === 200 || xhr2.status === 201) {
          localStorage.setItem(SYNC_TIME_KEY, Date.now().toString());
          setSyncStatus('synced', '已同步 ' + new Date().toLocaleTimeString());
          if (callback) callback(true);
        } else {
          console.error('上传失败:', xhr2.status, xhr2.responseText);
          setSyncStatus('error', '同步失败(' + xhr2.status + ')');
          if (callback) callback(false);
        }
      };
      
      xhr2.onerror = function() {
        isSyncing = false;
        setSyncStatus('error', '网络错误');
        if (callback) callback(false);
      };
      
      xhr2.send(body);
    };
    
    xhr1.onerror = function() {
      // 获取 sha 失败，尝试直接上传（文件可能不存在）
      var body = JSON.stringify({
        message: '自动同步流水数据',
        content: content
      });
      
      var xhr2 = new XMLHttpRequest();
      xhr2.open('PUT', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + GITHUB_FILE);
      xhr2.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
      xhr2.setRequestHeader('Content-Type', 'application/json');
      xhr2.setRequestHeader('Accept', 'application/vnd.github.v3+json');
      
      xhr2.onload = function() {
        isSyncing = false;
        if (xhr2.status === 200 || xhr2.status === 201) {
          localStorage.setItem(SYNC_TIME_KEY, Date.now().toString());
          setSyncStatus('synced', '已同步 ' + new Date().toLocaleTimeString());
          if (callback) callback(true);
        } else {
          console.error('上传失败:', xhr2.status, xhr2.responseText);
          setSyncStatus('error', '同步失败(' + xhr2.status + ')');
          if (callback) callback(false);
        }
      };
      
      xhr2.onerror = function() {
        isSyncing = false;
        setSyncStatus('error', '网络错误');
        if (callback) callback(false);
      };
      
      xhr2.send(body);
    };
    
    xhr1.send();
  }

  // ============ GitHub 下载 ============
  function downloadFromGitHub(callback) {
    if (isSyncing) { if (callback) callback(false); return; }
    isSyncing = true;
    setSyncStatus('syncing', '同步中...');
    
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + GITHUB_FILE);
    xhr.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
    xhr.setRequestHeader('Accept', 'application/vnd.github.v3+json');
    xhr.setRequestHeader('Cache-Control', 'no-cache');
    
    xhr.onload = function() {
      isSyncing = false;
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          var remoteContent = JSON.parse(decodeURIComponent(escape(atob(data.content))));
          if (Array.isArray(remoteContent)) {
            var merged = remoteContent.slice();
            var remoteIds = {};
            merged.forEach(function(t) { remoteIds[t.id] = true; });
            transactions.forEach(function(t) {
              if (!remoteIds[t.id]) merged.push(t);
            });
            merged.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
            transactions = merged;
            saveLocalData();
            localStorage.setItem(SYNC_TIME_KEY, Date.now().toString());
            setSyncStatus('synced', '已同步 ' + new Date().toLocaleTimeString());
            if (callback) callback(true);
            return;
          }
        } catch(e) {
          console.error('解析数据失败:', e);
        }
      } else if (xhr.status === 404) {
        // 文件不存在，首次使用
        if (transactions.length > 0) {
          uploadToGitHub(function(ok) {
            if (ok) {
              setSyncStatus('synced', '已同步 ' + new Date().toLocaleTimeString());
            }
            if (callback) callback(ok);
          });
          return;
        } else {
          setSyncStatus('synced', '等待首次记账');
        }
      } else {
        console.error('下载失败:', xhr.status, xhr.responseText);
        setSyncStatus('error', '同步失败(' + xhr.status + ')');
      }
      if (callback) callback(false);
    };
    
    xhr.onerror = function() {
      isSyncing = false;
      setSyncStatus('error', '网络错误');
      if (callback) callback(false);
    };
    
    xhr.send();
  }

  // ============ 手动同步 ============
  function forceSync() {
    downloadFromGitHub(function() {
      renderList();
      uploadToGitHub();
    });
  }

  // ============ 常用项目 ============
  function getRecent(type) {
    var key = type === 'income' ? RECENT_INCOME_KEY : RECENT_EXPENSE_KEY;
    return JSON.parse(localStorage.getItem(key) || '[]');
  }

  function addRecent(type, category) {
    var key = type === 'income' ? RECENT_INCOME_KEY : RECENT_EXPENSE_KEY;
    var items = JSON.parse(localStorage.getItem(key) || '[]');
    items = items.filter(function(i) { return i !== category; });
    items.unshift(category);
    if (items.length > 10) items.pop();
    localStorage.setItem(key, JSON.stringify(items));
  }

  function renderQuickTags() {
    var typeSelect = document.getElementById('typeSelect');
    var container = document.getElementById('quickTags');
    if (!typeSelect || !container) return;
    var type = typeSelect.value;
    var items = getRecent(type);
    container.innerHTML = items.map(function(item) {
      return '<span class="tag" data-category="' + item.replace(/"/g, '&quot;').replace(/'/g, '&#39;') + '">' + item + '</span>';
    }).join('');
    
    container.querySelectorAll('.tag').forEach(function(tag) {
      tag.addEventListener('click', function() {
        var catInput = document.getElementById('categoryInput');
        if (catInput) catInput.value = this.dataset.category;
      });
    });
  }

  // ============ 导出导入 ============
  function exportData() {
    if (transactions.length === 0) { alert('没有数据可导出'); return; }
    var dataStr = JSON.stringify(transactions, null, 2);
    var blob = new Blob([dataStr], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '旅店流水账备份_' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData() {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          var data = JSON.parse(ev.target.result);
          if (!Array.isArray(data)) throw new Error('格式错误');
          if (confirm('导入将合并数据（共' + data.length + '条），确定？')) {
            var existingIds = {};
            transactions.forEach(function(t) { existingIds[t.id] = true; });
            var newCount = 0;
            data.forEach(function(item) {
              if (!existingIds[item.id]) {
                transactions.push(item);
                newCount++;
              }
            });
            transactions.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
            saveLocalData();
            uploadToGitHub();
            renderList();
            alert('导入成功！新增 ' + newCount + ' 条');
          }
        } catch (err) {
          alert('文件格式不正确');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // ============ 月份切换 ============
  function changeMonth(monthStr, delta) {
    var parts = monthStr.split('-');
    var year = parseInt(parts[0]);
    var month = parseInt(parts[1]);
    month = month + delta;
    if (month > 12) { year++; month = 1; }
    else if (month < 1) { year--; month = 12; }
    return year + '-' + (month < 10 ? '0' : '') + month;
  }

  function changeListMonth(delta) {
    currentListMonth = changeMonth(currentListMonth, delta);
    renderList();
  }

  function changeSummaryMonth(delta) {
    currentSummaryMonth = changeMonth(currentSummaryMonth, delta);
    renderSummary();
  }

  // ============ 日期工具 ============
  function getMonthRange(monthStr) {
    var parts = monthStr.split('-');
    var year = parseInt(parts[0]);
    var month = parseInt(parts[1]);
    var start = new Date(year, month - 1, 1);
    var end = new Date(year, month, 0);
    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    return { 
      start: start.getFullYear() + '-' + pad(start.getMonth() + 1) + '-' + pad(start.getDate()),
      end: end.getFullYear() + '-' + pad(end.getMonth() + 1) + '-' + pad(end.getDate())
    };
  }

  function filterByMonth(txs, monthStr) {
    var range = getMonthRange(monthStr);
    return txs.filter(function(t) {
      return t.date >= range.start && t.date <= range.end;
    });
  }

  // ============ 页面切换 ============
  function switchTab(pageId) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    var targetTab = document.querySelector('.tab[data-page="' + pageId + '"]');
    var targetPage = document.getElementById(pageId);
    if (targetTab) targetTab.classList.add('active');
    if (targetPage) targetPage.classList.add('active');
    if (pageId === 'summary') renderSummary();
  }

  // ============ 流水列表 ============
  function renderList() {
    var monthEl = document.getElementById('currentMonth');
    if (monthEl) monthEl.textContent = currentListMonth.replace('-','年') + '月';
    
    var monthTxs = filterByMonth(transactions, currentListMonth);
    var filtered = monthTxs;
    if (filterType === 'income') filtered = monthTxs.filter(function(t) { return t.type === 'income'; });
    else if (filterType === 'expense') filtered = monthTxs.filter(function(t) { return t.type === 'expense'; });

    var totalIncome = monthTxs.filter(function(t) { return t.type === 'income'; }).reduce(function(s,t) { return s + t.amount; }, 0);
    var totalExpense = monthTxs.filter(function(t) { return t.type === 'expense'; }).reduce(function(s,t) { return s + t.amount; }, 0);
    
    var listCards = document.getElementById('listCards');
    if (listCards) {
      listCards.innerHTML = 
        '<div class="card income"><div class="label">收入</div><div class="value">' + totalIncome.toFixed(2) + '</div></div>' +
        '<div class="card expense"><div class="label">支出</div><div class="value">' + totalExpense.toFixed(2) + '</div></div>' +
        '<div class="card balance"><div class="label">结余</div><div class="value">' + (totalIncome - totalExpense).toFixed(2) + '</div></div>';
    }

    var listEl = document.getElementById('txList');
    if (!listEl) return;
    
    if (filtered.length === 0) {
      listEl.innerHTML = '<li style="text-align:center;padding:40px;color:#999;">暂无记录</li>';
    } else {
      var html = '';
      filtered.forEach(function(tx) {
        html += '<li class="tx-item">' +
          '<div class="tx-icon ' + tx.type + '">' + (tx.type === 'income' ? '+' : '-') + '</div>' +
          '<div class="tx-info">' +
            '<div class="tx-category">' + tx.category + '</div>' +
            '<div class="tx-date">' + tx.date + (tx.note ? ' · ' + tx.note : '') + '</div>' +
          '</div>' +
          '<div class="tx-amount ' + tx.type + '">' + (tx.type === 'income' ? '+' : '-') + tx.amount.toFixed(2) + '</div>' +
          '<button class="delete-btn" data-id="' + tx.id + '">🗑</button>' +
        '</li>';
      });
      listEl.innerHTML = html;
      
      listEl.querySelectorAll('.delete-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          deleteTx(this.getAttribute('data-id'));
        });
      });
    }
  }

  function setFilter(type) {
    filterType = type;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    var activeBtn = document.querySelector('.filter-btn[data-filter="' + type + '"]');
    if (activeBtn) activeBtn.classList.add('active');
    renderList();
  }

  function deleteTx(id) {
    if (!confirm('确定删除？')) return;
    transactions = transactions.filter(function(t) { return t.id !== id; });
    saveLocalData();
    uploadToGitHub();
    renderList();
  }

  // ============ 记账 ============
  function saveTx() {
    var typeSelect = document.getElementById('typeSelect');
    var amountInput = document.getElementById('amountInput');
    var categoryInput = document.getElementById('categoryInput');
    var dateInput = document.getElementById('dateInput');
    var noteInput = document.getElementById('noteInput');

    var type = typeSelect ? typeSelect.value : 'expense';
    var amount = amountInput ? parseFloat(amountInput.value) : 0;
    var category = categoryInput ? categoryInput.value.trim() : '';
    var date = dateInput ? dateInput.value : new Date().toISOString().slice(0,10);
    var note = noteInput ? noteInput.value.trim() : '';

    if (!amount || amount <= 0) { alert('请输入有效金额'); return; }
    if (!category) { alert('请输入项目名称'); return; }

    transactions.unshift({
      id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 5),
      type: type,
      amount: amount,
      category: category,
      date: date,
      note: note
    });

    saveLocalData();
    addRecent(type, category);
    uploadToGitHub(function(ok) {
      if (ok) {
        console.log('自动同步成功');
      }
    });

    if (amountInput) amountInput.value = '';
    if (categoryInput) categoryInput.value = '';
    if (noteInput) noteInput.value = '';
    if (dateInput) dateInput.value = new Date().toISOString().slice(0,10);
    renderQuickTags();
    alert('保存成功！');
  }

  // ============ 月度汇总 ============
  function renderSummary() {
    var summaryMonthEl = document.getElementById('summaryMonth');
    if (summaryMonthEl) summaryMonthEl.textContent = currentSummaryMonth.replace('-','年') + '月';
    
    var monthTxs = filterByMonth(transactions, currentSummaryMonth);
    var totalIncome = monthTxs.filter(function(t) { return t.type === 'income'; }).reduce(function(s,t) { return s + t.amount; }, 0);
    var totalExpense = monthTxs.filter(function(t) { return t.type === 'expense'; }).reduce(function(s,t) { return s + t.amount; }, 0);

    var summaryCards = document.getElementById('summaryCards');
    if (summaryCards) {
      summaryCards.innerHTML = 
        '<div class="card income"><div class="label">总收入</div><div class="value">' + totalIncome.toFixed(2) + '</div></div>' +
        '<div class="card expense"><div class="label">总支出</div><div class="value">' + totalExpense.toFixed(2) + '</div></div>' +
        '<div class="card balance"><div class="label">结余</div><div class="value">' + (totalIncome - totalExpense).toFixed(2) + '</div></div>';
    }

    var expenseMap = {};
    monthTxs.filter(function(t) { return t.type === 'expense'; }).forEach(function(t) {
      expenseMap[t.category] = (expenseMap[t.category] || 0) + t.amount;
    });
    var expenseEntries = Object.entries(expenseMap).sort(function(a,b) { return b[1] - a[1]; });
    
    var incomeMap = {};
    monthTxs.filter(function(t) { return t.type === 'income'; }).forEach(function(t) {
      incomeMap[t.category] = (incomeMap[t.category] || 0) + t.amount;
    });
    var incomeEntries = Object.entries(incomeMap).sort(function(a,b) { return b[1] - a[1]; });

    var ctx = document.getElementById('pieChart');
    if (ctx) {
      if (pieChartInstance) pieChartInstance.destroy();
      var ctx2d = ctx.getContext('2d');
      var allLabels = expenseEntries.map(function(e) { return e[0] + '(支出)'; }).concat(incomeEntries.map(function(e) { return e[0] + '(收入)'; }));
      var allData = expenseEntries.map(function(e) { return e[1]; }).concat(incomeEntries.map(function(e) { return e[1]; }));
      
      if (allLabels.length > 0) {
        pieChartInstance = new Chart(ctx2d, {
          type: 'doughnut',
          data: {
            labels: allLabels,
            datasets: [{ data: allData, backgroundColor: [
              '#FF3B30','#FF9500','#FFCC00','#FF6482','#FF375F','#FF2D55',
              '#34C759','#30B0C7','#32ADE6','#007AFF','#5856D6','#AF52DE'
            ]}]
          },
          options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
      }
    }

    var detailList = document.getElementById('detailList');
    if (detailList) {
      var html = '<h4 style="margin-top:20px;">支出明细</h4>';
      if (expenseEntries.length === 0) {
        html += '<p style="color:#999">无支出</p>';
      } else {
        expenseEntries.forEach(function(item) {
          html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;"><span>' + item[0] + '</span><span style="color:#FF3B30;font-weight:600;">' + item[1].toFixed(2) + '</span></div>';
        });
      }
      html += '<h4 style="margin-top:20px;">收入明细</h4>';
      if (incomeEntries.length === 0) {
        html += '<p style="color:#999">无收入</p>';
      } else {
        incomeEntries.forEach(function(item) {
          html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;"><span>' + item[0] + '</span><span style="color:#34C759;font-weight:600;">' + item[1].toFixed(2) + '</span></div>';
        });
      }
      detailList.innerHTML = html;
    }
  }

  // ============ 事件绑定 ============
  function bindAllEvents() {
    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() { switchTab(this.dataset.page); });
    });

    document.getElementById('prevMonthBtn').addEventListener('click', function() { changeListMonth(-1); });
    document.getElementById('nextMonthBtn').addEventListener('click', function() { changeListMonth(1); });
    document.getElementById('summaryPrevBtn').addEventListener('click', function() { changeSummaryMonth(-1); });
    document.getElementById('summaryNextBtn').addEventListener('click', function() { changeSummaryMonth(1); });
    document.getElementById('saveBtn').addEventListener('click', saveTx);
    document.getElementById('typeSelect').addEventListener('change', renderQuickTags);
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', importData);
    document.getElementById('forceSyncBtn').addEventListener('click', forceSync);

    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { setFilter(this.dataset.filter); });
    });

    document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);
  }

  // ============ 启动 ============
  function init() {
    loadLocalData();
    bindAllEvents();
    renderQuickTags();
    renderList();
    downloadFromGitHub(function(ok) {
      if (ok) renderList();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  }
</script>
</body>
</html>
