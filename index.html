<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f5f5f5">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>旅店流水账
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f0f5; color: #333;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; padding: 16px;
    }
    .app {
      width: 100%; max-width: 480px;
      background: #fff; border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .tabs {
      display: flex; border-bottom: 1px solid #eee;
    }
    .tab {
      flex: 1; padding: 14px; text-align: center;
      font-weight: 600; color: #999; cursor: pointer;
      transition: 0.2s;
    }
    .tab.active { color: #007AFF; border-bottom: 2px solid #007AFF; }
    .page { display: none; padding: 16px; }
    .page.active { display: block; }
    .month-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .month-bar button {
      background: none; border: none; font-size: 20px; padding: 12px;
      cursor: pointer; color: #007AFF;
    }
    .month-title {
      font-size: 18px; font-weight: bold;
    }
    .summary-cards {
      display: flex; gap: 12px; margin-bottom: 20px;
    }
    .card {
      flex: 1; padding: 12px; border-radius: 12px;
      text-align: center; color: #fff;
    }
    .card.income { background: #34C759; }
    .card.expense { background: #FF3B30; }
    .card.balance { background: #007AFF; }
    .card .label { font-size: 12px; opacity: 0.9; }
    .card .value { font-size: 18px; font-weight: bold; margin-top: 4px; }
    .sync-status {
      text-align: center; font-size: 12px; color: #999;
      padding: 4px 0; margin-bottom: 8px;
    }
    .sync-status.synced { color: #34C759; }
    .sync-status.syncing { color: #FF9500; }
    .sync-status.error { color: #FF3B30; }
    .tx-list { list-style: none; }
    .tx-item {
      display: flex; align-items: center; padding: 12px 0;
      border-bottom: 1px solid #f0f0f5;
    }
    .tx-icon {
      width: 40px; height: 40px; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #fff; margin-right: 12px; flex-shrink: 0;
    }
    .tx-icon.income { background: #34C759; }
    .tx-icon.expense { background: #FF3B30; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-category { font-weight: 500; }
    .tx-date { font-size: 12px; color: #999; margin-top: 2px; }
    .tx-amount { font-weight: 600; font-size: 16px; flex-shrink: 0; margin-left: 8px; }
    .tx-amount.income { color: #34C759; }
    .tx-amount.expense { color: #FF3B30; }
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 12px;
    }
    .filter-btn {
      padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px;
      background: #fff; font-size: 14px; cursor: pointer;
      transition: 0.2s;
    }
    .filter-btn.active { background: #007AFF; color: #fff; border-color: #007AFF; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px; border: 1px solid #ddd;
      border-radius: 10px; font-size: 16px;
    }
    .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .tag {
      padding: 6px 14px; background: #f0f0f5; border-radius: 20px;
      font-size: 14px; cursor: pointer;
    }
    .btn-primary {
      width: 100%; padding: 14px; background: #007AFF;
      color: #fff; border: none; border-radius: 12px;
      font-size: 18px; font-weight: bold; cursor: pointer;
    }
    .btn-primary:disabled { background: #ccc; }
    .btn-secondary {
      flex: 1; padding: 12px; color: #fff; border: none;
      border-radius: 10px; font-size: 14px; cursor: pointer;
    }
    .btn-export { background: #007AFF; }
    .btn-import { background: #34C759; }
    .chart-container { max-width: 300px; margin: 0 auto 20px; }
    .delete-btn {
      background: none; border: none; color: #FF3B30; font-size: 20px;
      cursor: pointer; padding: 0 8px; flex-shrink: 0;
    }
    .action-buttons {
      display: flex; gap: 12px; margin-top: 16px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="tabs">
    <div class="tab active" data-page="list">流水</div>
    <div class="tab" data-page="add">记一笔</div>
    <div class="tab" data-page="summary">汇总</div>
  </div>

  <!-- 流水列表页 -->
  <div class="page active" id="list">
    <div class="month-bar">
      <button id="prevMonthBtn">◀</button>
      <span class="month-title" id="currentMonth"></span>
      <button id="nextMonthBtn">▶</button>
    </div>
    <div class="sync-status" id="syncStatus">准备同步...</div>
    <div class="summary-cards" id="listCards"></div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="income">收入</button>
      <button class="filter-btn" data-filter="expense">支出</button>
    </div>
    <ul class="tx-list" id="txList"></ul>
    <div class="action-buttons">
      <button class="btn-secondary btn-export" onclick="exportData()">📤 导出备份</button>
      <button class="btn-secondary btn-import" onclick="importData()">📥 导入恢复</button>
      <button class="btn-secondary" style="background:#FF9500;" onclick="forceSync()">🔄 手动同步</button>
    </div>
  </div>

  <!-- 记账页 -->
  <div class="page" id="add">
    <h3 style="margin-bottom:16px;">记一笔</h3>
    <div class="form-group">
      <label>类型</label>
      <select id="typeSelect">
        <option value="income">收入</option>
        <option value="expense">支出</option>
      </select>
    </div>
    <div class="form-group">
      <label>金额</label>
      <input type="number" id="amountInput" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="form-group">
      <label>项目</label>
      <input type="text" id="categoryInput" placeholder="如房费、电费...">
      <div class="quick-tags" id="quickTags"></div>
    </div>
    <div class="form-group">
      <label>日期</label>
      <input type="date" id="dateInput">
    </div>
    <div class="form-group">
      <label>备注（可选）</label>
      <input type="text" id="noteInput" placeholder="备注">
    </div>
    <button class="btn-primary" id="saveBtn">保存</button>
  </div>

  <!-- 月度汇总页 -->
  <div class="page" id="summary">
    <div class="month-bar">
      <button id="summaryPrevBtn">◀</button>
      <span class="month-title" id="summaryMonth"></span>
      <button id="summaryNextBtn">▶</button>
    </div>
    <div class="summary-cards" id="summaryCards"></div>
    <div class="chart-container">
      <canvas id="pieChart"></canvas>
    </div>
    <div id="detailList"></div>
  </div>
</div>

<script>
  // ============ 配置（需要修改这里）============
  const GITHUB_TOKEN = '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';
  const GITHUB_REPO = 'higou8888-byte/hotel';
  const GITHUB_FILE = 'ledger_data.json';
  // ============ 配置结束 ============

  const STORAGE_KEY = 'hotel_ledger_transactions';
  const RECENT_INCOME_KEY = 'recent_income';
  const RECENT_EXPENSE_KEY = 'recent_expense';
  const SYNC_TIME_KEY = 'hotel_ledger_last_sync';

  let transactions = [];
  let currentListMonth = new Date().toISOString().slice(0,7);
  let currentSummaryMonth = new Date().toISOString().slice(0,7);
  let filterType = 'all';
  let pieChartInstance = null;
  let isSyncing = false;

  // ============ 本地数据操作 ============
  function loadLocalData() {
    const data = localStorage.getItem(STORAGE_KEY);
    transactions = data ? JSON.parse(data) : [];
  }

  function saveLocalData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
  }

  // ============ GitHub 同步 ============
  function setSyncStatus(status, text) {
    const el = document.getElementById('syncStatus');
    el.textContent = text;
    el.className = 'sync-status ' + status;
  }

  // 上传数据到 GitHub
  async function uploadToGitHub() {
    if (isSyncing) return;
    isSyncing = true;
    setSyncStatus('syncing', '⏳ 正在上传...');
    try {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(transactions, null, 2))));
      
      // 先获取现有文件的 sha
      let sha = '';
      try {
        const getRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
          headers: { 
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        if (getRes.ok) {
          const getData = await getRes.json();
          sha = getData.sha || '';
        }
      } catch(e) {
        // 文件不存在，sha 为空，会创建新文件
      }
      
      const body = {
        message: '自动同步流水数据',
        content: content
      };
      if (sha) body.sha = sha;

      const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${GITHUB_TOKEN}`,
          'Content-Type': 'application/json',
          'Accept': 'application/vnd.github.v3+json'
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        localStorage.setItem(SYNC_TIME_KEY, Date.now().toString());
        setSyncStatus('synced', '✅ 已同步 ' + new Date().toLocaleTimeString());
      } else {
        const errData = await res.json();
        console.error('上传失败:', errData);
        setSyncStatus('error', '❌ 上传失败，点击手动同步重试');
      }
    } catch(e) {
      console.error('同步错误:', e);
      setSyncStatus('error', '❌ 网络错误，稍后重试');
    }
    isSyncing = false;
  }

  // 从 GitHub 下载数据
  async function downloadFromGitHub() {
    if (isSyncing) return;
    isSyncing = true;
    setSyncStatus('syncing', '⏳ 正在下载最新数据...');
    try {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
        headers: { 
          'Authorization': `token ${GITHUB_TOKEN}`,
          'Accept': 'application/vnd.github.v3+json'
        },
        cache: 'no-cache'
      });
      
      if (!res.ok) {
        // 文件可能不存在（首次使用），直接用本地数据上传
        if (transactions.length > 0) {
          await uploadToGitHub();
        } else {
          setSyncStatus('synced', '✅ 等待首次记账');
        }
        isSyncing = false;
        return;
      }

      const data = await res.json();
      const remoteContent = JSON.parse(decodeURIComponent(escape(atob(data.content))));
      
      if (Array.isArray(remoteContent)) {
        const lastSync = localStorage.getItem(SYNC_TIME_KEY);
        // 合并策略：如果本地有更新的数据，以本地为准
        if (lastSync && transactions.length > 0 && remoteContent.length > 0) {
          // 简单合并：用 ID 去重，保留两边的数据
          const merged = [...remoteContent];
          const remoteIds = new Set(merged.map(t => t.id));
          transactions.forEach(t => {
            if (!remoteIds.has(t.id)) {
              merged.push(t);
            }
          });
          merged.sort((a, b) => new Date(b.date) - new Date(a.date));
          transactions = merged;
        } else if (remoteContent.length >= transactions.length) {
          // 远程数据更多或相等，用远程的
          transactions = remoteContent;
        }
        // 否则保持本地数据不变（本地更多）
        
        saveLocalData();
        localStorage.setItem(SYNC_TIME_KEY, Date.now().toString());
        setSyncStatus('synced', '✅ 已同步 ' + new Date().toLocaleTimeString());
        console.log('云端数据加载成功，共', transactions.length, '条');
      }
    } catch(e) {
      console.error('下载错误:', e);
      setSyncStatus('error', '❌ 网络错误，使用本地数据');
    }
    isSyncing = false;
  }

  // 手动强制同步
  async function forceSync() {
    await downloadFromGitHub();
    await uploadToGitHub();
    renderList();
    if (document.getElementById('summary').classList.contains('active')) {
      renderSummary();
    }
  }

  // ============ 常用项目 ============
  function getRecent(type) {
    const key = type === 'income' ? RECENT_INCOME_KEY : RECENT_EXPENSE_KEY;
    return JSON.parse(localStorage.getItem(key) || '[]');
  }

  function addRecent(type, category) {
    const key = type === 'income' ? RECENT_INCOME_KEY : RECENT_EXPENSE_KEY;
    let items = JSON.parse(localStorage.getItem(key) || '[]');
    items = items.filter(i => i !== category);
    items.unshift(category);
    if (items.length > 10) items.pop();
    localStorage.setItem(key, JSON.stringify(items));
  }

  function renderQuickTags() {
    const type = document.getElementById('typeSelect').value;
    const items = getRecent(type);
    const container = document.getElementById('quickTags');
    container.innerHTML = items.map(item => 
      `<span class="tag" onclick="document.getElementById('categoryInput').value='${item.replace(/'/g, "\\'")}'">${item}</span>`
    ).join('');
  }

  // ============ 导出导入 ============
  function exportData() {
    const dataStr = JSON.stringify(transactions, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '旅店流水账备份_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    alert('导出成功！文件已下载。');
  }

  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const data = JSON.parse(ev.target.result);
          if (!Array.isArray(data)) throw new Error('格式错误');
          if (confirm('导入将合并数据（共' + data.length + '条记录），确定继续？')) {
            // 合并导入的数据
            const existingIds = new Set(transactions.map(t => t.id));
            let newCount = 0;
            data.forEach(item => {
              if (!existingIds.has(item.id)) {
                transactions.push(item);
                newCount++;
              }
            });
            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            saveLocalData();
            uploadToGitHub();
            renderList();
            alert('导入成功！新增 ' + newCount + ' 条记录');
          }
        } catch (err) {
          alert('文件格式不正确，请选择之前导出的备份文件。');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // ============ 日期工具 ============
  function getMonthRange(monthStr) {
    const [year, month] = monthStr.split('-').map(Number);
    const start = new Date(year, month-1, 1);
    const end = new Date(year, month, 0);
    return { start: start.toISOString().slice(0,10), end: end.toISOString().slice(0,10) };
  }

  function filterByMonth(txs, monthStr) {
    const range = getMonthRange(monthStr);
    return txs.filter(t => t.date >= range.start && t.date <= range.end);
  }

  // ============ 页面切换 ============
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      document.getElementById(this.dataset.page).classList.add('active');
      if (this.dataset.page === 'summary') renderSummary();
    });
  });

  // ============ 事件绑定 ============
  document.getElementById('prevMonthBtn').addEventListener('click', function() { changeListMonth(-1); });
  document.getElementById('nextMonthBtn').addEventListener('click', function() { changeListMonth(1); });
  document.getElementById('summaryPrevBtn').addEventListener('click', function() { changeSummaryMonth(-1); });
  document.getElementById('summaryNextBtn').addEventListener('click', function() { changeSummaryMonth(1); });
  document.getElementById('saveBtn').addEventListener('click', saveTx);
  document.getElementById('typeSelect').addEventListener('change', renderQuickTags);

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() { setFilter(this.dataset.filter); });
  });

  // ============ 流水列表 ============
  function renderList() {
    document.getElementById('currentMonth').textContent = currentListMonth.replace('-','年')+'月';
    const monthTxs = filterByMonth(transactions, currentListMonth);
    let filtered = monthTxs;
    if (filterType === 'income') filtered = monthTxs.filter(t => t.type==='income');
    else if (filterType === 'expense') filtered = monthTxs.filter(t => t.type==='expense');

    const totalIncome = monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const totalExpense = monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    document.getElementById('listCards').innerHTML = `
      <div class="card income"><div class="label">收入</div><div class="value">${totalIncome.toFixed(2)}</div></div>
      <div class="card expense"><div class="label">支出</div><div class="value">${totalExpense.toFixed(2)}</div></div>
      <div class="card balance"><div class="label">结余</div><div class="value">${(totalIncome-totalExpense).toFixed(2)}</div></div>
    `;

    const listEl = document.getElementById('txList');
    if (filtered.length === 0) {
      listEl.innerHTML = '<li style="text-align:center;padding:40px;color:#999;">暂无记录</li>';
    } else {
      listEl.innerHTML = filtered.map(tx => `
        <li class="tx-item">
          <div class="tx-icon ${tx.type}">${tx.type==='income'?'+':'−'}</div>
          <div class="tx-info">
            <div class="tx-category">${tx.category}</div>
            <div class="tx-date">${tx.date}${tx.note ? ' · '+tx.note : ''}</div>
          </div>
          <div class="tx-amount ${tx.type}">${tx.type==='income'?'+':'-'}${tx.amount.toFixed(2)}</div>
          <button class="delete-btn" data-id="${tx.id}">🗑</button>
        </li>
      `).join('');
      
      // 给删除按钮绑定事件
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          deleteTx(this.dataset.id);
        });
      });
    }
  }

  function setFilter(type) {
    filterType = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.filter-btn[data-filter="${type}"]`).classList.add('active');
    renderList();
  }

  function changeListMonth(delta) {
    const [year, month] = currentListMonth.split('-').map(Number);
    const d = new Date(year, month-1+delta, 1);
    currentListMonth = d.toISOString().slice(0,7);
    renderList();
  }

  function deleteTx(id) {
    if (!confirm('确定删除这条记录吗？')) return;
    transactions = transactions.filter(t => t.id !== id);
    saveLocalData();
    uploadToGitHub();
    renderList();
  }

  // ============ 记账 ============
  document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);

  function saveTx() {
    const type = document.getElementById('typeSelect').value;
    const amount = parseFloat(document.getElementById('amountInput').value);
    const category = document.getElementById('categoryInput').value.trim();
    const date = document.getElementById('dateInput').value;
    const note = document.getElementById('noteInput').value.trim();

    if (!amount || amount <= 0) { alert('请输入有效金额'); return; }
    if (!category) { alert('请输入项目名称'); return; }

    transactions.unshift({
      id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 5),
      type, amount, category, date, note
    });

    saveLocalData();
    addRecent(type, category);
    uploadToGitHub();

    // 清空表单
    document.getElementById('amountInput').value = '';
    document.getElementById('categoryInput').value = '';
    document.getElementById('noteInput').value = '';
    document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);
    renderQuickTags();
    alert('保存成功！数据已自动同步到云端。');
  }

  // ============ 月度汇总 ============
  function renderSummary() {
    document.getElementById('summaryMonth').textContent = currentSummaryMonth.replace('-','年')+'月';
    const monthTxs = filterByMonth(transactions, currentSummaryMonth);
    const totalIncome = monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const totalExpense = monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

    document.getElementById('summaryCards').innerHTML = `
      <div class="card income"><div class="label">总收入</div><div class="value">${totalIncome.toFixed(2)}</div></div>
      <div class="card expense"><div class="label">总支出</div><div class="value">${totalExpense.toFixed(2)}</div></div>
      <div class="card balance"><div class="label">结余</div><div class="value">${(totalIncome-totalExpense).toFixed(2)}</div></div>
    `;

    const expenseMap = {};
    monthTxs.filter(t=>t.type==='expense').forEach(t => {
      expenseMap[t.category] = (expenseMap[t.category]||0) + t.amount;
    });
    const expenseEntries = Object.entries(expenseMap).sort((a,b)=>b[1]-a[1]);
    const incomeMap = {};
    monthTxs.filter(t=>t.type==='income').forEach(t => {
      incomeMap[t.category] = (incomeMap[t.category]||0) + t.amount;
    });
    const incomeEntries = Object.entries(incomeMap).sort((a,b)=>b[1]-a[1]);

    if (pieChartInstance) pieChartInstance.destroy();
    const ctx = document.getElementById('pieChart');
    if (!ctx) return;
    const ctx2d = ctx.getContext('2d');
    const allLabels = [...expenseEntries.map(e=>e[0]+'(支出)'), ...incomeEntries.map(e=>e[0]+'(收入)')];
    const allData = [...expenseEntries.map(e=>e[1]), ...incomeEntries.map(e=>e[1])];
    
    if (allLabels.length > 0) {
      pieChartInstance = new Chart(ctx2d, {
        type: 'doughnut',
        data: {
          labels: allLabels,
          datasets: [{ data: allData, backgroundColor: [
            '#FF3B30','#FF9500','#FFCC00','#FF6482','#FF375F','#FF2D55',
            '#34C759','#30B0C7','#32ADE6','#007AFF','#5856D6','#AF52DE'
          ]}]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
      });
    }

    const detailHTML = `
      <h4 style="margin-top:20px;">支出明细</h4>
      ${expenseEntries.length === 0 ? '<p style="color:#999">无支出</p>' : 
        expenseEntries.map(([cat, amt]) => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;"><span>${cat}</span><span style="color:#FF3B30;font-weight:600;">${amt.toFixed(2)}</span></div>`).join('')}
      <h4 style="margin-top:20px;">收入明细</h4>
      ${incomeEntries.length === 0 ? '<p style="color:#999">无收入</p>' :
        incomeEntries.map(([cat, amt]) => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;"><span>${cat}</span><span style="color:#34C759;font-weight:600;">${amt.toFixed(2)}</span></div>`).join('')}
    `;
    document.getElementById('detailList').innerHTML = detailHTML;
  }

  function changeSummaryMonth(delta) {
    const [year, month] = currentSummaryMonth.split('-').map(Number);
    const d = new Date(year, month-1+delta, 1);
    currentSummaryMonth = d.toISOString().slice(0,7);
    renderSummary();
  }

  // ============ 初始化 ============
  async function init() {
    loadLocalData();
    await downloadFromGitHub();
    renderQuickTags();
    renderList();
    // 如果本地有新数据，上传
    if (transactions.length > 0) {
      const lastSync = localStorage.getItem(SYNC_TIME_KEY);
      if (!lastSync || Date.now() - parseInt(lastSync) > 60000) {
        await uploadToGitHub();
      }
    }
  }

  init();

  // Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
